<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Formal repo dossier generated from Agent Skill Anatomy runs." />
    <title>Repo Dossier · Agent Skill Anatomy</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="repo-dossier-body">
    <main class="repo-dossier" data-repo-dossier>
      <header class="repo-dossier-topbar">
        <a class="brand" href="../index.html#top" aria-label="Agent Skill Anatomy"><span class="brand-mark"></span><span class="brand-text">Agent Skill Anatomy</span></a>
        <nav>
          <a href="../index.html#entry" data-i18n data-zh="拆解首页" data-en="Home">拆解首页</a>
          <a href="../cinema/" data-i18n data-zh="Demo" data-en="Demo">Demo</a>
          <a href="../report/" data-i18n data-zh="Report" data-en="Report">Report</a>
          <a href="../data/" data-i18n data-zh="Data" data-en="Data">Data</a>
          <a href="../graph/" data-i18n data-zh="Graph" data-en="Graph">Graph</a>
          <button class="lang-toggle" type="button" data-lang-toggle aria-label="Switch language">EN</button>
        </nav>
      </header>

      <section class="repo-dossier-hero">
        <div class="repo-dossier-copy">
          <span class="repo-dossier-kicker" data-repo-kind>loading</span>
          <h1><span data-i18n data-zh="正式 Repo" data-en="Formal Repo">正式 Repo</span><em data-i18n data-zh="拆解档案" data-en="Dossier">拆解档案</em></h1>
          <p data-repo-summary data-i18n data-zh="正在读取本次 run 的结构、workflow、证据与复用资产。" data-en="Loading structure, workflow, evidence, and reusable assets from this run.">正在读取本次 run 的结构、workflow、证据与复用资产。</p>
          <div class="repo-broadcast-strip" data-repo-broadcast></div>
          <div class="repo-extracted-panel">
            <span data-i18n data-zh="这次实际拆出了什么" data-en="What was extracted">这次实际拆出了什么</span>
            <div data-repo-extracted></div>
          </div>
          <div class="repo-dossier-actions">
            <a class="button primary" href="#slices" data-i18n data-zh="查看六层拆解" data-en="View six layers">查看六层拆解</a>
            <a class="button ghost" href="../cinema/" data-i18n data-zh="观看 Demo" data-en="Watch Demo">观看 Demo</a>
            <a class="button ghost" href="../report/" data-i18n data-zh="打开报告" data-en="Open Report">打开报告</a>
          </div>
        </div>
        <aside class="repo-dossier-card" data-repo-profile-card>
          <span data-i18n data-zh="Run Dossier" data-en="Run Dossier">Run Dossier</span>
          <strong data-repo-name>Agent Skill Anatomy</strong>
          <p data-repo-source>loading source</p>
          <div class="repo-trust-strip" data-repo-trust></div>
        </aside>
      </section>

      <section class="repo-dossier-layout" id="slices">
        <aside class="repo-skill-rail">
          <span data-i18n data-zh="Skill Focus" data-en="Skill Focus">Skill Focus</span>
          <div data-repo-skill-list></div>
        </aside>
        <div class="repo-card-grid" data-repo-card-grid></div>
      </section>

      <section class="repo-reading-panel">
        <div>
          <span class="repo-dossier-kicker" data-i18n data-zh="阅读建议" data-en="Reading Path">阅读建议</span>
          <h2 data-i18n data-zh="先看结构 再看证据 最后沉淀复用" data-en="Structure first Evidence next Reuse last">先看结构 再看证据 最后沉淀复用</h2>
        </div>
        <div class="repo-output-grid">
          <a href="../report/" data-output-kind="report"><span>Report</span><strong data-i18n data-zh="专业报告" data-en="Professional report">专业报告</strong></a>
          <a href="../vault/00%20Maps/Agent%20Skill%20Anatomy%20MOC.md" data-output-kind="vault"><span>Vault</span><strong data-i18n data-zh="Obsidian 学习库" data-en="Obsidian vault">Obsidian 学习库</strong></a>
          <a href="../report/artifacts/" data-output-kind="data"><span>Data</span><strong data-i18n data-zh="JSON 事实源" data-en="JSON facts">JSON 事实源</strong></a>
          <a href="../cinema/" data-output-kind="cinema"><span>Demo</span><strong data-i18n data-zh="滚轮叙事" data-en="Scroll story">滚轮叙事</strong></a>
        </div>
      </section>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
